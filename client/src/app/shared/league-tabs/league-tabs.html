<nav class="league-tabs" aria-label="Competitions">
  @for (competition of competitions(); track competition.id) {
    <button
      type="button"
      class="league-tabs__tab"
      [class.league-tabs__tab--active]="competition.id === selectedId()"
      (click)="selected.emit(competition.id)"
    >
      <app-crest [src]="competition.emblem" [alt]="competition.name" [size]="22" />
      <span class="league-tabs__name">{{ competition.name }}</span>
    </button>
  }
</nav>
